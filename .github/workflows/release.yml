name: Build and release icon

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  release:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build icon
        run: npm run build:icon

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: build-${{ github.run_id }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; nothing to do."
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            dist/factorio.ico \
            --target "$GITHUB_SHA" \
            --title "Build ${GITHUB_SHA::7}" \
            --notes "Automated icon build from commit $GITHUB_SHA." \
            --latest
